name: internet_verify
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  android_intent_plus: ^5.0.0
  fl_chart: ^0.70.0
  sqflite: ^2.3.0
